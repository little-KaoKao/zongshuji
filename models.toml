# 模型注册表 —— RunningHub 标准模型 API
#
# 每个条目：
#   kind         = image / video / audio
#   endpoint     = standard  （扁平 JSON 调用；另有 quick_ai_app / ai_app 走 nodeInfoList）
#   path         = POST 路径，从 RunningHub API 文档复制
#   prompt_field = prompt 在 body 里的字段名（大部分模型就是 "prompt"）
#   defaults     = body 的其余字段默认值。调用时 --set key=value 可覆盖
#   image_fields = 哪些字段需要先 `./rh upload <path>` 取 URL 再填（注释用，不影响调用）
#
# 发起生成：
#   ./rh generate youchuan-v7 --slot 01_智枢 --prompt "..." --set aspectRatio=2:3 --set quality=2
#   ./rh generate vidu-i2v-q3 --slot 01_智枢 --prompt "神兽腾跃..." --set imageUrl=https://... --set duration=8
#
# 覆盖值的类型：true/false 解析为布尔，纯数字解析为整数，其它为字符串。
# 文档来源：https://www.runninghub.cn/runninghub-api-doc-cn/

# ==================== 文生图 ====================

# 悠船文生图-v7
[models.youchuan-v7]
kind = "image"
endpoint = "standard"
path = "/openapi/v2/youchuan/text-to-image-v7"
prompt_field = "prompt"
image_fields = ["imageUrl", "sref", "oref"]  # 如需风格/角色参考，先 upload 再 --set
[models.youchuan-v7.defaults]
aspectRatio = "2:3"
quality = "2"         # "1" | "2" | "4"，高质量优先选 2
# chaos = 0, stylize = 100, weird = 0, raw = false, iw = 1, sw = 100, sv = 4, ow = 100, tile = false, negativePrompt

# 全能图片V2 文生图（官方稳定版）
[models.omni-v2]
kind = "image"
endpoint = "standard"
path = "/openapi/v2/rhart-image-n-g31-flash-official/text-to-image"
prompt_field = "prompt"
[models.omni-v2.defaults]
aspectRatio = "2:3"   # 1:1 | 16:9 | 9:16 | 4:3 | 3:4 | 3:2 | 2:3 | 5:4 | 4:5 | 21:9 | 1:4 | 4:1 | 1:8 | 8:1
resolution = "4k"     # 1k | 2k | 4k

# seedream-v5-lite 文生图
[models.seedream-v5-lite]
kind = "image"
endpoint = "standard"
path = "/openapi/v2/seedream-v5-lite/text-to-image"
prompt_field = "prompt"
[models.seedream-v5-lite.defaults]
resolution = "3k"     # "2k" | "3k"；resolution 优先级高于 width/height
# width = 2048, height = 2048, sequentialImageGeneration = "disabled", maxImages = 1
# 出组图：--set sequentialImageGeneration=auto --set maxImages=4

# ==================== 图生视频 ====================

# Vidu Q3 Pro 图生视频
[models.vidu-i2v-q3]
kind = "video"
endpoint = "standard"
path = "/openapi/v2/vidu/image-to-video-q3-pro"
prompt_field = "prompt"
image_fields = ["imageUrl"]  # 必填，先 upload
[models.vidu-i2v-q3.defaults]
duration = "8"        # 枚举 1-16（秒）
resolution = "1080p"  # 360p | 540p | 720p | 1080p | 2k
audio = true

# 万相 2.7 图生视频（支持首帧 / 首尾帧）
[models.wan-i2v-2_7]
kind = "video"
endpoint = "standard"
path = "/openapi/v2/alibaba/wan-2.7/image-to-video"
prompt_field = "prompt"
image_fields = ["firstImageUrl", "lastImageUrl", "audioUrl"]  # firstImageUrl 必填
[models.wan-i2v-2_7.defaults]
resolution = "1080P"  # "720P" | "1080P"（注意大小写：大写 P）
duration = "5"        # "2"..."15"
promptExtend = true
# negativePrompt = "", seed 自动

# Seedance 2.0 global 图生视频（支持首帧 / 首尾帧）
[models.seedance-2_0-i2v]
kind = "video"
endpoint = "standard"
path = "/openapi/v2/bytedance/seedance-2.0-global/image-to-video"
prompt_field = "prompt"
image_fields = ["firstFrameUrl", "lastFrameUrl"]  # firstFrameUrl 必填
[models.seedance-2_0-i2v.defaults]
resolution = "1080p"  # 480p | 720p | native1080p | 1080p | 2k | 4k
duration = "5"        # "4"-"15"
ratio = "adaptive"    # adaptive | 16:9 | 4:3 | 1:1 | 3:4 | 9:16 | 21:9
generateAudio = true
realPersonMode = true
